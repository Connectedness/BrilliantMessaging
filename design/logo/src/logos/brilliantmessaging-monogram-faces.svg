<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 80" fill="none">
  <!--
    Brilliant Messaging — Concept 1, variant B: "Docked to the faces".
    Same explicit route as the primary monogram, but the two diagonals of the
    "M" connect to the MIDDLE of the diamond's upper-left and upper-right edges
    instead of meeting at its top vertex. The exchange's peak stays visible
    between the incoming routes — the message clearly docks into the exchange.
  -->
  <!-- the route / topology — note the gap at the top vertex -->
  <path d="M18 64 V16 L39.5 35.5 M56.5 35.5 L78 16 V64"
        stroke="#1F2937" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- the routing exchange -->
  <rect x="36" y="32" width="24" height="24" rx="3" transform="rotate(45 48 44)" fill="#14B8A6"/>
  <!-- the two explicit endpoints -->
  <circle cx="18" cy="64" r="8" fill="#1F2937"/>
  <circle cx="78" cy="64" r="8" fill="#1F2937"/>
</svg>
