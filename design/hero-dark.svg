<svg xmlns="http://www.w3.org/2000/svg" width="540" height="280" viewBox="0 0 540 280" fill="none" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Brilliant Messaging - Explicit. No Magic.">
  <!-- Concept 3 "The Pulse" hero — self-contained for GitHub README embedding.
       Colours are baked in (no external CSS); the mark spins via SMIL and the
       message dots travel the arcs. Dark-theme variant: white structure, cyan hub. -->
  <g transform="translate(200,18) scale(2.1875)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="30s" repeatCount="indefinite"/>
      <path id="hd-arc-a" d="M32 32 C38 22 40 17 32 10" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
      <path id="hd-arc-b" d="M32 32 C37.66 42.2 40.99 46.43 51.05 43" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
      <path id="hd-arc-c" d="M32 32 C20.34 31.8 15.01 32.57 12.95 43" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
      <path d="M32 23 A15.59 15.59 0 0 1 39.79 36.5 A15.59 15.59 0 0 1 24.21 36.5 A15.59 15.59 0 0 1 32 23 Z" fill="#00CDEA"/>
      <circle cx="32" cy="10" r="5.5" fill="#FFFFFF"/>
      <circle cx="51.05" cy="43" r="5.5" fill="#FFFFFF"/>
      <circle cx="12.95" cy="43" r="5.5" fill="#FFFFFF"/>
      <circle r="4.5" fill="#00CDEA" opacity="0">
        <animateMotion dur="2.4s" repeatCount="indefinite"><mpath href="#hd-arc-a"/></animateMotion>
        <animate attributeName="opacity" dur="2.4s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.18;0.72;1"/>
      </circle>
      <circle r="4.5" fill="#00CDEA" opacity="0">
        <animateMotion dur="2.4s" repeatCount="indefinite"><mpath href="#hd-arc-b"/></animateMotion>
        <animate attributeName="opacity" dur="2.4s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.18;0.72;1"/>
      </circle>
      <circle r="4.5" fill="#00CDEA" opacity="0">
        <animateMotion dur="2.4s" repeatCount="indefinite"><mpath href="#hd-arc-c"/></animateMotion>
        <animate attributeName="opacity" dur="2.4s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.18;0.72;1"/>
      </circle>
    </g>
  </g>
  <text x="270" y="212" text-anchor="middle" font-size="38" font-weight="700" letter-spacing="0" fill="#FFFFFF">Brilliant Messaging</text>
  <text x="270" y="246" text-anchor="middle" font-size="15" letter-spacing="0.5" fill="#9CA3AF">Explicit. No Magic.</text>
</svg>
